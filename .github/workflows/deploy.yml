name: deploy

# Deploys Vault HA on AWS from an ephemeral runner. Authenticates with OIDC
# (no stored AWS credentials) by assuming the role created by
# cloudformation/github-oidc.yaml. Order: primary -> bootstrap -> DR.
#
# Required repo variables (Settings -> Actions -> Variables):
#   PRIMARY_REGION  DR_REGION  TF_STATE_BUCKET  TF_LOCK_TABLE  TF_STATE_BUCKET_REGION
# Required repo secret (Settings -> Actions -> Secrets):
#   AWS_DEPLOY_ROLE_ARN

on:
  workflow_dispatch:
    inputs:
      target:
        description: Which region(s) to apply.
        type: choice
        default: both
        options: [primary, dr, both]
      domain_name:
        description: Optional custom FQDN for HTTPS (e.g. vault.example.com). Its Route53 public zone must exist in this account. Leave blank for HTTP on :8200.
        type: string
        default: ""

permissions:
  id-token: write   # mint the OIDC token used to assume the AWS role
  contents: read    # actions/checkout

concurrency:
  group: vault-ha-deploy
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "1"
  PRIMARY_DIR: regions/primary
  DR_DIR: regions/dr

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 #v4.2.2
        with:
          fetch-depth: 1

      # - name: Debug OIDC token claims
      #   run: |
      #     TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
      #       "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | python3 -c \
      #       "import sys,json,base64; t=json.load(sys.stdin)['value']; \
      #        p=t.split('.')[1]; p+='=='*(-len(p)%4); \
      #        print(json.dumps(json.loads(base64.b64decode(p)), indent=2))")
      #     echo "$TOKEN"

      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b #v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.PRIMARY_REGION }}

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e #v4.1
        with:
          terraform_wrapper: false

      # The runner creates the Terraform state backend itself (idempotent), so
      # tier-0 stays limited to the OIDC trust anchor.
      - name: Ensure state backend
        env:
          BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TABLE: ${{ vars.TF_LOCK_TABLE }}
          REGION: ${{ vars.TF_STATE_BUCKET_REGION }}
        run: |
          set -euo pipefail
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Creating state bucket $BUCKET in $REGION"
            if [ "$REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION"
            else
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION" \
                --create-bucket-configuration LocationConstraint="$REGION"
            fi
            aws s3api put-bucket-versioning --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption --bucket "$BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"aws:kms"}}]}'
            aws s3api put-public-access-block --bucket "$BUCKET" \
              --public-access-block-configuration \
              BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
          else
            echo "State bucket $BUCKET already exists."
          fi

          if ! aws dynamodb describe-table --table-name "$TABLE" --region "$REGION" >/dev/null 2>&1; then
            echo "Creating lock table $TABLE in $REGION"
            aws dynamodb create-table --table-name "$TABLE" --region "$REGION" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST
            aws dynamodb wait table-exists --table-name "$TABLE" --region "$REGION"
          else
            echo "Lock table $TABLE already exists."
          fi

      - name: Apply primary
        if: ${{ inputs.target == 'primary' || inputs.target == 'both' }}
        env:
          BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TABLE: ${{ vars.TF_LOCK_TABLE }}
          BACKEND_REGION: ${{ vars.TF_STATE_BUCKET_REGION }}
          PRIMARY_REGION: ${{ vars.PRIMARY_REGION }}
          DR_REGION: ${{ vars.DR_REGION }}
          DOMAIN_NAME: ${{ inputs.domain_name }}
        run: |
          set -euo pipefail
          terraform -chdir="$PRIMARY_DIR" init -input=false \
            -backend-config="bucket=$BUCKET" \
            -backend-config="key=vault-ha/primary/terraform.tfstate" \
            -backend-config="region=$BACKEND_REGION" \
            -backend-config="dynamodb_table=$TABLE"
          terraform -chdir="$PRIMARY_DIR" apply -input=false -auto-approve \
            -var "region=$PRIMARY_REGION" \
            -var "dr_region=$DR_REGION" \
            -var "domain_name=$DOMAIN_NAME"

      - name: Build and push bootstrap image
        if: ${{ inputs.target == 'primary' || inputs.target == 'both' }}
        run: |
          set -euo pipefail
          ECR_URL="$(terraform -chdir="$PRIMARY_DIR" output -raw bootstrap_ecr_repository_url)"
          REGISTRY="${ECR_URL%%/*}"
          aws ecr get-login-password --region "${{ vars.PRIMARY_REGION }}" \
            | docker login --username AWS --password-stdin "$REGISTRY"
          docker build -t "$ECR_URL:latest" -t "$ECR_URL:${GITHUB_SHA}" modules/bootstrap
          docker push "$ECR_URL:latest"
          docker push "$ECR_URL:${GITHUB_SHA}"

      - name: Run bootstrap task
        if: ${{ inputs.target == 'primary' || inputs.target == 'both' }}
        env:
          PRIMARY_REGION: ${{ vars.PRIMARY_REGION }}
        run: |
          set -euo pipefail
          CLUSTER="$(terraform -chdir="$PRIMARY_DIR" output -raw ecs_cluster_name)"
          TASKDEF="$(terraform -chdir="$PRIMARY_DIR" output -raw bootstrap_task_definition_family)"
          SG="$(terraform -chdir="$PRIMARY_DIR" output -raw vault_security_group_id)"
          SUBNETS="$(terraform -chdir="$PRIMARY_DIR" output -json private_subnet_ids | jq -r 'join(",")')"
          LOG_GROUP="$(terraform -chdir="$PRIMARY_DIR" output -raw bootstrap_log_group_name)"

          NETWORK="awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=DISABLED}"
          TASK_ARN="$(aws ecs run-task --region "$PRIMARY_REGION" \
            --cluster "$CLUSTER" --task-definition "$TASKDEF" \
            --launch-type FARGATE --network-configuration "$NETWORK" \
            --query 'tasks[0].taskArn' --output text)"
          echo "Bootstrap task: $TASK_ARN"

          echo "Waiting for bootstrap task to stop (max 30 min)..."
          MAX_WAIT=1800
          ELAPSED=0
          INTERVAL=15
          LAST_STATUS=""
          while [ "$ELAPSED" -lt "$MAX_WAIT" ]; do
            LAST_STATUS="$(aws ecs describe-tasks --region "$PRIMARY_REGION" \
              --cluster "$CLUSTER" --tasks "$TASK_ARN" \
              --query 'tasks[0].lastStatus' --output text)"
            echo "  ${ELAPSED}s: $LAST_STATUS"
            [ "$LAST_STATUS" = "STOPPED" ] && break
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          if [ "$LAST_STATUS" != "STOPPED" ]; then
            echo "::error::Bootstrap task timed out after ${MAX_WAIT}s (still $LAST_STATUS)"
            exit 1
          fi

          TASK_JSON="$(aws ecs describe-tasks --region "$PRIMARY_REGION" --cluster "$CLUSTER" --tasks "$TASK_ARN")"
          EXIT_CODE="$(echo "$TASK_JSON" | jq -r '.tasks[0].containers[0].exitCode // "None"')"
          STOPPED_REASON="$(echo "$TASK_JSON" | jq -r '.tasks[0].stoppedReason // "unknown"')"
          CONTAINER_REASON="$(echo "$TASK_JSON" | jq -r '.tasks[0].containers[0].reason // "none"')"

          echo "Bootstrap container exit code:  $EXIT_CODE"
          echo "Task stopped reason:            $STOPPED_REASON"
          echo "Container reason:               $CONTAINER_REASON"

          TASK_ID="${TASK_ARN##*/}"
          echo "--- bootstrap logs ---"
          aws logs get-log-events --region "$PRIMARY_REGION" \
            --log-group-name "$LOG_GROUP" \
            --log-stream-name "bootstrap/bootstrap/$TASK_ID" \
            --query 'events[].message' --output text 2>/dev/null || echo "(logs not available)"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Bootstrap task failed (exit $EXIT_CODE) — reason: $STOPPED_REASON"
            exit 1
          fi

      - name: Diagnose Vault service (on failure)
        if: ${{ failure() && (inputs.target == 'primary' || inputs.target == 'both') }}
        env:
          PRIMARY_REGION: ${{ vars.PRIMARY_REGION }}
        run: |
          set +e
          CLUSTER="$(terraform -chdir="$PRIMARY_DIR" output -raw ecs_cluster_name)"
          SERVICE="$(terraform -chdir="$PRIMARY_DIR" output -raw vault_service_name)"

          echo "=== Vault service status ==="
          aws ecs describe-services --region "$PRIMARY_REGION" \
            --cluster "$CLUSTER" --services "$SERVICE" \
            --query 'services[0].{desired:desiredCount,running:runningCount,pending:pendingCount}' --output table

          echo "=== Vault service events (last 15) ==="
          aws ecs describe-services --region "$PRIMARY_REGION" \
            --cluster "$CLUSTER" --services "$SERVICE" \
            --query 'services[0].events[:15].message' --output text

          echo "=== Recent Vault tasks (incl. stopped) ==="
          STOPPED_TASKS="$(aws ecs list-tasks --region "$PRIMARY_REGION" \
            --cluster "$CLUSTER" --service-name "$SERVICE" \
            --desired-status STOPPED --query 'taskArns[:5]' --output text)"
          RUNNING_TASKS="$(aws ecs list-tasks --region "$PRIMARY_REGION" \
            --cluster "$CLUSTER" --service-name "$SERVICE" \
            --desired-status RUNNING --query 'taskArns[:5]' --output text)"
          ALL_TASKS="$STOPPED_TASKS $RUNNING_TASKS"

          if [ -n "$(echo "$ALL_TASKS" | tr -d ' ')" ]; then
            aws ecs describe-tasks --region "$PRIMARY_REGION" --cluster "$CLUSTER" --tasks $ALL_TASKS \
              --query 'tasks[].{status:lastStatus,health:healthStatus,stopped:stoppedReason,exit:containers[0].exitCode,reason:containers[0].reason}' \
              --output table
          fi

          echo "=== Latest Vault container logs ==="
          for T in $RUNNING_TASKS $STOPPED_TASKS; do
            TID="${T##*/}"
            echo "--- task $TID ---"
            aws logs get-log-events --region "$PRIMARY_REGION" \
              --log-group-name "/ecs/vault-primary-vault" \
              --log-stream-name "vault/vault/$TID" \
              --limit 60 --query 'events[].message' --output text 2>/dev/null || echo "(no logs for $TID)"
          done

      - name: Apply DR
        if: ${{ inputs.target == 'dr' || inputs.target == 'both' }}
        env:
          BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TABLE: ${{ vars.TF_LOCK_TABLE }}
          BACKEND_REGION: ${{ vars.TF_STATE_BUCKET_REGION }}
          DR_REGION: ${{ vars.DR_REGION }}
        run: |
          set -euo pipefail
          # DR consumes the primary's seal key + global cluster id. Read them
          # from the primary state (already init'd above when target=both; init
          # primary first when running target=dr standalone).
          if [ ! -d "$PRIMARY_DIR/.terraform" ]; then
            terraform -chdir="$PRIMARY_DIR" init -input=false \
              -backend-config="bucket=$BUCKET" \
              -backend-config="key=vault-ha/primary/terraform.tfstate" \
              -backend-config="region=$BACKEND_REGION" \
              -backend-config="dynamodb_table=$TABLE"
          fi
          SEAL_ARN="$(terraform -chdir="$PRIMARY_DIR" output -raw seal_key_arn)"
          GLOBAL_ID="$(terraform -chdir="$PRIMARY_DIR" output -raw global_cluster_identifier)"

          terraform -chdir="$DR_DIR" init -input=false \
            -backend-config="bucket=$BUCKET" \
            -backend-config="key=vault-ha/dr/terraform.tfstate" \
            -backend-config="region=$BACKEND_REGION" \
            -backend-config="dynamodb_table=$TABLE"
          terraform -chdir="$DR_DIR" apply -input=false -auto-approve \
            -var "region=$DR_REGION" \
            -var "primary_seal_key_arn=$SEAL_ARN" \
            -var "global_cluster_identifier=$GLOBAL_ID"
