name: destroy

# Tears down Vault HA, DR first then primary (reverse of deploy): the DR Aurora
# cluster is a member of the primary's global cluster and the DR seal key is a
# replica of the primary key, so DR must go first. OIDC auth, no stored secrets.
#
# Requires deletion_protection=false and skip_final_snapshot=true (scaffold
# defaults). Production values block teardown by design.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type "destroy" to confirm. Anything else aborts.
        type: string
        required: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: vault-ha-deploy   # share the deploy lock; never destroy mid-deploy
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "1"
  PRIMARY_DIR: regions/primary
  DR_DIR: regions/dr

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Verify confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "destroy" ]; then
            echo "::error::confirm must be exactly 'destroy' (got '${{ inputs.confirm }}')"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.PRIMARY_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Destroy DR then primary
        env:
          BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TABLE: ${{ vars.TF_LOCK_TABLE }}
          BACKEND_REGION: ${{ vars.TF_STATE_BUCKET_REGION }}
          PRIMARY_REGION: ${{ vars.PRIMARY_REGION }}
          DR_REGION: ${{ vars.DR_REGION }}
        run: |
          set -euo pipefail

          terraform -chdir="$PRIMARY_DIR" init -input=false \
            -backend-config="bucket=$BUCKET" \
            -backend-config="key=vault-ha/primary/terraform.tfstate" \
            -backend-config="region=$BACKEND_REGION" \
            -backend-config="dynamodb_table=$TABLE"
          SEAL_ARN="$(terraform -chdir="$PRIMARY_DIR" output -raw seal_key_arn)"
          GLOBAL_ID="$(terraform -chdir="$PRIMARY_DIR" output -raw global_cluster_identifier)"
          # Auto-detect whether a custom domain was used (reads it from state so
          # the operator never has to re-supply it). Empty => HTTP-only deploy.
          DOMAIN_NAME="$(terraform -chdir="$PRIMARY_DIR" output -raw domain_name 2>/dev/null || true)"

          echo "==> Destroying DR"
          terraform -chdir="$DR_DIR" init -input=false \
            -backend-config="bucket=$BUCKET" \
            -backend-config="key=vault-ha/dr/terraform.tfstate" \
            -backend-config="region=$BACKEND_REGION" \
            -backend-config="dynamodb_table=$TABLE"

          # Safety net: detach the DR cluster from the global cluster before
          # destroy. The provider usually does this on delete, but Aurora Global
          # teardown is historically flaky; an explicit, idempotent detach avoids
          # a stuck "cluster is a member of a global cluster" deletion.
          DR_CLUSTER_ID="$(terraform -chdir="$DR_DIR" output -raw aurora_cluster_identifier)"
          ACCOUNT="$(aws sts get-caller-identity --query Account --output text)"
          DR_CLUSTER_ARN="arn:aws:rds:${DR_REGION}:${ACCOUNT}:cluster:${DR_CLUSTER_ID}"
          echo "    Detaching ${DR_CLUSTER_ID} from global cluster ${GLOBAL_ID}"
          aws rds remove-from-global-cluster \
            --global-cluster-identifier "$GLOBAL_ID" \
            --db-cluster-identifier "$DR_CLUSTER_ARN" 2>/dev/null \
            || echo "    (already detached or not a member)"
          aws rds wait db-cluster-available --region "$DR_REGION" \
            --db-cluster-identifier "$DR_CLUSTER_ID" 2>/dev/null || true

          terraform -chdir="$DR_DIR" destroy -input=false -auto-approve \
            -var "region=$DR_REGION" \
            -var "primary_seal_key_arn=$SEAL_ARN" \
            -var "global_cluster_identifier=$GLOBAL_ID"

          echo "==> Destroying primary"
          terraform -chdir="$PRIMARY_DIR" destroy -input=false -auto-approve \
            -var "region=$PRIMARY_REGION" \
            -var "dr_region=$DR_REGION" \
            -var "domain_name=$DOMAIN_NAME"
